<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Placement Monitor</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="auth-split-layout">
        <div class="auth-branding">
            <h1>Placement Monitor</h1>
            <p>Secure password recovery protocol utilizing advanced Supabase endpoints.</p>
        </div>

        <div class="auth-panel">
            <div class="auth-panel-card">
                <h2>Reset password</h2>
                <p>Enter the email address tied to your account to receive instructions.</p>
                <form id="resetForm">
                    <div class="form-group">
                        <label for="resetEmail">Email Address</label>
                        <input type="email" id="resetEmail" required autocomplete="email" placeholder="admin@example.com">
                    </div>
                    <div id="authError" style="color: var(--accent-red); margin-bottom: 1rem; font-size: 0.875rem; display: none; background: rgba(239,68,68,0.1); padding: 0.5rem; border-radius: 0.25rem;"></div>
                    <div id="authSuccess" style="color: var(--accent-green); margin-bottom: 1rem; font-size: 0.875rem; display: none; background: rgba(16,185,129,0.1); padding: 0.5rem; border-radius: 0.25rem;"></div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1rem;" id="resetBtn">
                        Send Reset Link
                    </button>
                    <div style="text-align: center;">
                        <a href="index.html" style="color: var(--text-secondary); font-size: 0.875rem; text-decoration: none;">← Back to login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/supabaseClient.js"></script>
    <script src="js/security.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
