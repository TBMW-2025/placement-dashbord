<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Companies - Placement Monitor</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2>📊 Placement Monitor</h2>
        </div>
        <ul class="nav-links">
            <li><a href="dashboard.html">🏠 Dashboard</a></li>
            <li><a href="students.html">🎓 Students</a></li>
            <li><a href="companies.html" class="active">🏢 Companies</a></li>
            <li><a href="internships.html">💼 Internships</a></li>
            <li><a href="placements.html">🚀 Placements</a></li>
            <li><a href="reports.html">📈 Reports</a></li>
            <li><a href="settings.html">⚙️ Settings</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Navbar -->
        <header class="topvar">
            <div class="topvar-search">
                <input type="text" id="searchInput" placeholder="Search companies...">
            </div>
            <div class="topvar-actions">
                <div class="user-profile">
                    <div class="avatar">A</div>
                    <span style="font-weight: 500;">Admin User</span>
                </div>
                <button class="btn btn-secondary" id="logoutBtn">Logout</button>
            </div>
        </header>

        <!-- Page Container -->
        <div class="page-container">
            <div class="page-header">
                <h1>Companies Module</h1>
                <button class="btn btn-primary" id="openAddModalBtn">+ Add Company</button>
            </div>

            <div class="table-container">
                <table id="companiesTable">
                    <thead>
                        <tr>
                            <th>Company Name</th>
                            <th>Role / Profile</th>
                            <th>Contact Person</th>
                            <th>Contact Email</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="companiesBody">
                        <tr><td colspan="5" class="table-loading"><span class="spinner"></span></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="companyModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add Company</h3>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <form id="companyForm">
                <input type="hidden" id="companyId">
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" id="company_name" required>
                </div>
                <div class="form-group">
                    <label>Role Offered</label>
                    <input type="text" id="role_offered">
                </div>
                <div class="form-group">
                    <label>Contact Person</label>
                    <input type="text" id="contact_person">
                </div>
                <div class="form-group">
                    <label>Contact Email</label>
                    <input type="email" id="contact_email">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;" id="saveBtn">Save Company</button>
            </form>
        </div>
    </div>

    <script src="js/supabaseClient.js"></script>
    <script src="js/security.js"></script>
    <script src="js/companies.js"></script>
</body>
</html>
