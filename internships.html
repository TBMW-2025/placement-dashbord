<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internships - Placement Monitor</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2>📊 Placement Monitor</h2>
        </div>
        <ul class="nav-links">
            <li><a href="dashboard.html">🏠 Dashboard</a></li>
            <li><a href="students.html">🎓 Students</a></li>
            <li><a href="companies.html">🏢 Companies</a></li>
            <li><a href="internships.html" class="active">💼 Internships</a></li>
            <li><a href="placements.html">🚀 Placements</a></li>
            <li><a href="reports.html">📈 Reports</a></li>
            <li><a href="settings.html">⚙️ Settings</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <header class="topvar">
            <div class="topvar-search">
                <input type="text" id="searchInput" placeholder="Search internships...">
            </div>
            <div class="topvar-actions">
                <div class="user-profile">
                    <div class="avatar">A</div>
                    <span style="font-weight: 500;">Admin User</span>
                </div>
                <button class="btn btn-secondary" id="logoutBtn">Logout</button>
            </div>
        </header>

        <div class="page-container">
            <div class="page-header">
                <h1>Internships Module</h1>
                <button class="btn btn-primary" id="openAddModalBtn">+ Add Internship</button>
            </div>

            <div class="table-container">
                <table id="internshipsTable">
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Enrollment</th>
                            <th>Company</th>
                            <th>Role</th>
                            <th>Duration</th>
                            <th>Type</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="internshipsBody">
                        <tr><td colspan="7" class="table-loading"><span class="spinner"></span></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="internshipModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add Internship</h3>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <form id="internshipForm">
                <input type="hidden" id="internshipId">
                <div class="form-group">
                    <label>Student</label>
                    <select id="student_id" required>
                        <option value="">Select Student...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Company</label>
                    <select id="company_id" required>
                        <option value="">Select Company...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Role / Position</label>
                    <input type="text" id="role">
                </div>
                <div class="form-group">
                    <label>Duration</label>
                    <input type="text" id="duration" placeholder="e.g. 6 Months">
                </div>
                <div class="form-group">
                    <label>Organization Type</label>
                    <input type="text" id="type_of_organization">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;" id="saveBtn">Save Internship</button>
            </form>
        </div>
    </div>

    <script src="js/supabaseClient.js"></script>
    <script src="js/security.js"></script>
    <script src="js/internships.js"></script>
</body>
</html>
